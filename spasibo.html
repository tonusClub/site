<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Спасибо! Заявка отправлена — Тонус-Клуб Пермь</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#2db347">
<!--YANDEX_METRIKA_HEAD-->
<style>
  :root {
    --green: #2db347;
    --green-dark: #239e3b;
    --orange: #f5a000;
    --text: #333;
    --bg: #f7f7f2;
    --white: #fff;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background:
      radial-gradient(circle at top right, rgba(245, 208, 0, .22), transparent 32%),
      radial-gradient(circle at bottom left, rgba(45, 179, 71, .18), transparent 28%),
      var(--bg);
    font-family: 'Montserrat', sans-serif;
    color: var(--text);
  }

  main {
    width: min(100%, 680px);
    background: var(--white);
    border-radius: 32px;
    padding: 40px 32px;
    box-shadow: 0 24px 60px rgba(26, 53, 31, .12);
    text-align: center;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: rgba(45, 179, 71, .12);
    color: var(--green-dark);
    font-size: 34px;
    font-weight: 800;
    margin-bottom: 20px;
  }

  h1 {
    margin: 0 0 16px;
    font-size: clamp(32px, 5vw, 46px);
    line-height: 1.02;
  }

  p {
    margin: 0 auto 28px;
    max-width: 44ch;
    font-size: 18px;
    line-height: 1.55;
    color: #555;
  }

  a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 240px;
    padding: 16px 22px;
    border-radius: 999px;
    background: var(--orange);
    color: var(--white);
    text-decoration: none;
    font-weight: 800;
    transition: transform .2s ease, box-shadow .2s ease;
    box-shadow: 0 16px 28px rgba(245, 160, 0, .18);
  }

  a:hover {
    transform: translateY(-1px);
    box-shadow: 0 20px 32px rgba(245, 160, 0, .24);
  }
</style>
</head>
<body>
<main>
  <div class="badge" aria-hidden="true">✓</div>
  <h1>Спасибо! Заявка отправлена.</h1>
  <p>Мы получили вашу заявку и скоро свяжемся с вами, чтобы подтвердить запись и подобрать удобное время визита.</p>
  <a href="/">Вернуться на главную</a>
</main>
<!--YANDEX_METRIKA_GOAL-->
</body>
</html>
